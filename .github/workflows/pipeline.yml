name: Full Pipeline (Cross-Org Shared Workflows)

on:
  workflow_dispatch:


jobs:

  # Stage 1: Security Scans (from sathish-training)
  security:
    name: Security Scans
    uses: saurabhorg6422/sharedWorkflow/.github/workflows/security-scan.yml@main
    with:
      fetch-depth: 1
      trivy-severity: 'CRITICAL,HIGH'
      codeql-language: 'java-kotlin'
      java-version: '17'
    permissions:
      contents: read
      security-events: write
      actions: read

  # Stage 2: Build & Test (from sathish-training)
  build:
    name: Build & Test
    needs: security
    uses: saurabhorg6422/sharedWorkflow/.github/workflows/java-build.yml@main
    with:
      java-version: '17'
      maven-goals: 'clean package -B'
    permissions:
      contents: read
      checks: write
      actions: read

  # Stage 3: Docker Build, Scan & Push (from sathish-training)
  docker:
    name: Docker Build & Push
    needs: build
    uses: saurabhorg6422/sharedWorkflow/.github/workflows/docker-build.yml@main
    with:
      image-name: ${{ github.repository }}
      trivy-severity: 'CRITICAL,HIGH'
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

  # Stage 4: Summary
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [security, build, docker]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Results
        run: |
          echo "=========================================="
          echo "  CROSS-ORG PIPELINE SUMMARY"
          echo "=========================================="
          echo "  Shared workflows : sathish-training"
          echo "  Running in       : sathish-dev01/javaapp"
          echo "=========================================="
          echo ""
          echo "  SECURITY SCANS"
          echo "  ─────────────────────────────────"
          echo "  Security Gate  : ${{ needs.security.result }}"
          echo ""
          echo "  BUILD & DELIVERY"
          echo "  ─────────────────────────────────"
          echo "  Build & Test   : ${{ needs.build.result }}"
          echo "  Docker & Push  : ${{ needs.docker.result }}"
          echo "=========================================="

          if [[ "${{ needs.docker.result }}" == "success" ]]; then
            echo ""
            echo "  ALL STAGES PASSED"
            echo "  Image: ghcr.io/${{ github.repository }}:latest"
            echo "=========================================="
          else
            echo ""
            echo "  PIPELINE FAILED"
            echo "=========================================="
            exit 1
          fi
